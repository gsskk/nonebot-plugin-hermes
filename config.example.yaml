# OneBot Bridge 配置
# 复制为 config.yaml 后修改

# OneBot 正向 WebSocket 地址（NapCatQQ / LLOneBot / go-cqhttp 等）
onebot:
  ws_url: "ws://127.0.0.1:3001"
  # 如果 OneBot 配置了 access_token，在这里填写
  access_token: ""

# Hermes Agent API Server 地址
hermes:
  api_url: "http://127.0.0.1:8642"
  # 如果 Hermes API Server 配置了 API_SERVER_KEY，在这里填写
  api_key: ""

# 机器人行为配置
bot:
  # 机器人的 QQ 号（用于识别 @自己，留空则自动从 OneBot 获取）
  self_id: ""

  # 群聊触发模式：
  #   "at"      - 仅在 @机器人 时回复（默认）
  #   "all"     - 回复群里所有消息
  #   "keyword" - 消息以指定关键词开头时回复
  group_trigger: "at"

  # keyword 模式的触发词列表
  keywords:
    - "/ai"
    - "小助手"

  # 私聊触发模式：
  #   "all"       - 回复所有私聊（默认）
  #   "allowlist"  - 仅回复 allow_users 中的用户
  private_trigger: "all"

  # 私聊白名单（仅 private_trigger=allowlist 时生效）
  allow_users: []

  # 群聊白名单（留空 = 所有群都响应）
  allow_groups: []

# 日志级别: DEBUG, INFO, WARNING, ERROR
log_level: "INFO"
